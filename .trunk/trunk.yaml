---
# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see
# https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here.
# (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters.
# (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - oxipng@10.1.0
    - actionlint@1.7.11
    - hadolint@2.14.0
    - mypy@1.19.1
    - bandit@1.9.4
    - black@26.3.1
    - checkov@3.2.510
    - git-diff-check
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.3
    - prettier@3.8.1
    - ruff@0.15.7
    - taplo@0.10.0
    - trufflehog@3.94.0
    - yamllint@1.38.0
  threshold:
    - linters: [bandit]
      level: medium
  ignore:
    - linters: [bandit, mypy]
      paths: [tests/**, regis/cookiecutters/**]
    - linters: [ALL]
      paths:
        - docs/website/docs/reference/schemas/**
        - docs/website/versioned_docs/**
    - linters: [markdownlint]
      paths:
        - "**/*.mdx"
        - CHANGELOG.md
        - CLAUDE.md
        - report.json
    - linters: [prettier]
      paths:
        - docs/website/versions.json

actions:
  definitions:
    - id: trunk-check-fix-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: trunk check --fix
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-check-fix-pre-commit
    - trunk-upgrade-available
