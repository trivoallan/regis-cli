spec:
  inputs:
    image_url:
      description: Image URL to analyze (e.g. ghcr.io/username/my-image:latest)
      default: ~
    playbook_url:
      description: URL of the regis-cli playbook to use
      default: "{{ cookiecutter.regis_playbook_url }}"
---
variables:
  # Default image — override with a CI/CD project variable named REGIS_CLI_IMAGE
  REGIS_CLI_IMAGE: "{{ cookiecutter.regis_cli_image_base }}:{{ cookiecutter.version }}"
stages:
  - request
  - analyze
  - report
  - deploy

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

# Phase 1: Manual trigger creates a branch and an MR
request_analysis:
  stage: request
  image:
    name: $REGIS_CLI_IMAGE
    entrypoint: [""]
  script:
    - |
      IMAGE_URL="$[[ inputs.image_url ]]"

      echo "Validating accessibility of $IMAGE_URL before creating request..."
      regis-cli check "$IMAGE_URL"

      # Create a unique branch name
      SAFE_URL=$(echo "$IMAGE_URL" | sed 's/[^a-zA-Z0-9]/_/g')
      BRANCH_NAME="regis/analyze/${SAFE_URL:0:30}-$CI_PIPELINE_IID"

      echo "Creating analysis request for $IMAGE_URL (requested by $GITLAB_USER_LOGIN)"
      echo "aW1wb3J0IGpzb24sIHN5cwpwcmludChqc29uLmR1bXBzKHsKICAnaW1hZ2VfdXJsJzogc3lzLmFyZ3ZbMV0sCiAgJ3BsYXlib29rX3VybCc6IHN5cy5hcmd2WzJdLAogICdyZXF1ZXN0ZXJfaWQnOiBpbnQoc3lzLmFyZ3ZbM10pLAogICdyZXF1ZXN0ZXJfbG9naW4nOiBzeXMuYXJndls0XSwKfSkpCg==" | base64 -d | python3 - "$IMAGE_URL" "$[[ inputs.playbook_url ]]" "$GITLAB_USER_ID" "$GITLAB_USER_LOGIN" > analysis-request.json

      git config --global user.name "GitLab CI"
      git config --global user.email "gitlab-ci@example.com"

      git checkout -b "$BRANCH_NAME"
      git add analysis-request.json
      git commit -m "chore: request analysis for $IMAGE_URL"

      # Push the branch
      git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$BRANCH_NAME"

      # Create MR via API to ensure correct reviewer/assignee
      # We set the requester as both assignee and reviewer
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"$BRANCH_NAME\",
          \"target_branch\": \"$CI_DEFAULT_BRANCH\",
          \"title\": \"Analysis Request: $IMAGE_URL\",
          \"description\": \"The analysis report will be exposed as an artifact in this Merge Request (see the 'Analysis Report' link) and committed to the \`reports/\` directory.\",
          \"reviewer_ids\": [${GITLAB_USER_ID}],
          \"remove_source_branch\": true
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""

# Phase 2: Analyze the image when the MR is opened/updated
analyze_image:
  stage: analyze
  image:
    name: $REGIS_CLI_IMAGE
    entrypoint: [""]
  before_script:
    - mkdir -p reports
  script:
    - |
      # Extract inputs from the committed file
      IMAGE_URL=$(python3 -c "import json; print(json.load(open('analysis-request.json'))['image_url'])")
      PLAYBOOK_URL=$(python3 -c "import json; print(json.load(open('analysis-request.json'))['playbook_url'])")
      REQUESTER_LOGIN=$(python3 -c "import json; print(json.load(open('analysis-request.json')).get('requester_login', '$GITLAB_USER_LOGIN'))")
      echo "Analyzing $IMAGE_URL requested by $REQUESTER_LOGIN..."

      regis-cli analyze "$IMAGE_URL" \
        --site \
        --playbook "$PLAYBOOK_URL" \
        --meta "trigger.user=$GITLAB_USER_LOGIN" \
        --meta "trigger.url=$CI_JOB_URL" \
        --meta "gitlab.mr_url=$CI_MERGE_REQUEST_URL" \
        --meta "gitlab.mr_id=$CI_MERGE_REQUEST_IID" \
        --meta "gitlab.mr=$CI_MERGE_REQUEST_IID"
      echo "$CI_JOB_ID" > reports/.analyze_job_id
  artifacts:
    expose_as: Analysis Report
    paths:
      - reports/
      - analysis-request.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Phase 3: Push results to branch and post MR comment
push_results:
  stage: report
  image: alpine:latest
  needs:
    - analyze_image
  before_script:
    - apk add --no-cache git curl python3
  script:
    - |
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "GITLAB_TOKEN not set, skipping push."
        exit 0
      fi

      IMAGE_URL=$(python3 -c "import json; print(json.load(open('analysis-request.json'))['image_url'])")

      echo "Pushing report to branch $CI_COMMIT_REF_NAME..."
      git config --global --add safe.directory "$CI_PROJECT_DIR"
      git config --global user.name "regis-cli bot"
      git config --global user.email "regis-cli@example.com"
      git add reports/
      git rm analysis-request.json || echo "Analysis request already removed"
      git commit -m "chore: update analysis report for $IMAGE_URL [skip ci]" || echo "No changes to commit"
      git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:${CI_COMMIT_REF_NAME}"

      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        REPORT_INDEX=$(find reports -name index.html -print -quit)
        if [ -n "$REPORT_INDEX" ]; then
          ANALYZE_JOB_ID=$(cat reports/.analyze_job_id 2>/dev/null || echo "$CI_JOB_ID")
          REPORT_URL="${CI_PROJECT_URL}/-/jobs/${ANALYZE_JOB_ID}/artifacts/external_file/${REPORT_INDEX}"
          echo "Posting MR comment with link to report..."
          curl --fail --request POST --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"body\": \"🚀 **regis-cli Analysis Complete!**\n\nThe full HTML security report is ready: [View Analysis Report]($REPORT_URL)\"}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"

          echo "Updating MR description with report link..."
          echo "" | base64 -d > /tmp/update_desc.py
          python3 /tmp/update_desc.py \
            "$REPORT_URL" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" \
            "${GITLAB_TOKEN}"
        fi
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Phase 3: Apply labels from report.json to the MR
set_labels:
  stage: report
  image: alpine:latest
  needs:
    - push_results
  before_script:
    - apk add --no-cache curl python3
  script:
    - |
      if [ -z "$GITLAB_TOKEN" ] || [ -z "$CI_MERGE_REQUEST_IID" ]; then
        echo "No token or no MR context, skipping labels."
        exit 0
      fi

      REPORT_JSON=$(find reports -name report.json -print -quit)
      if [ -z "$REPORT_JSON" ]; then
        echo "No report.json found, skipping labels."
        exit 0
      fi

      LABELS=$(python3 -c "import json; print(','.join(json.load(open('$REPORT_JSON')).get('playbook', {}).get('labels', [])))")
      if [ -n "$LABELS" ]; then
        echo "Applying labels to MR: $LABELS"
        curl --fail --request PUT --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --data "add_labels=${LABELS}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
      else
        echo "No labels to apply."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_MERGE_REQUEST_IID

# Phase 3: Append review checklist to MR description
set_checklist:
  stage: report
  image: alpine:latest
  needs:
    - push_results
  before_script:
    - apk add --no-cache curl python3
  script:
    - |
      if [ -z "$GITLAB_TOKEN" ] || [ -z "$CI_MERGE_REQUEST_IID" ]; then
        echo "No token or no MR context, skipping checklist."
        exit 0
      fi

      REPORT_JSON=$(find reports -name report.json -print -quit)
      if [ -z "$REPORT_JSON" ]; then
        echo "No report.json found, skipping checklist."
        exit 0
      fi

      echo "" | base64 -d > /tmp/checklist_script.py
      CHECKLIST=$(python3 /tmp/checklist_script.py "$REPORT_JSON")
      if [ -n "$CHECKLIST" ]; then
        echo "Appending checklist to MR description..."
        curl --silent --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" \
          > /tmp/mr_current.json
        CURRENT_DESC=$(python3 -c "import json; print(json.load(open('/tmp/mr_current.json')).get('description','') or '')")
        printf '%s%s' "$CURRENT_DESC" "$CHECKLIST" > /tmp/mr_desc_combined.txt
        python3 -c "import json; d=open('/tmp/mr_desc_combined.txt').read(); print(json.dumps({'description':d}))" > /tmp/mr_payload.json
        curl --fail --request PUT \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "@/tmp/mr_payload.json" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
      else
        echo "No checklist items to apply."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_MERGE_REQUEST_IID

# Phase 3: Deploy to GitLab Pages (Default branch only)
pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Publishing to production pages"
  pages:
    publish: reports
  artifacts:
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
