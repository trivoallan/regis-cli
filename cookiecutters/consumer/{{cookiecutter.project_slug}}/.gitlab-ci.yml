spec:
  inputs:
    image_url:
      description: Image URL to analyze (e.g. ghcr.io/username/my-image:latest)
      default: ~
    regis_cli_version:
      description: Version of regis-cli to use (e.g. latest, 1.2.0)
      default: "{{ cookiecutter.version }}"
    playbook_url:
      description: URL of the regis-cli playbook to use
      default: "{{ cookiecutter.regis_playbook_url }}"
---
variables:
  REGIS_CLI_IMAGE: "{{ cookiecutter.regis_cli_image_base }}:$[[ inputs.regis_cli_version ]]"
stages:
  - request
  - analyze
  - deploy

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

# Phase 1: Manual trigger creates a branch and an MR
request_analysis:
  stage: request
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl python3
  script:
    - |
      IMAGE_URL="$[[ inputs.image_url ]]"
      # Create a unique branch name
      SAFE_URL=$(echo "$IMAGE_URL" | sed 's/[^a-zA-Z0-9]/_/g')
      BRANCH_NAME="regis/analyze/${SAFE_URL:0:30}-$CI_PIPELINE_IID"

      echo "Creating analysis request for $IMAGE_URL (requested by $GITLAB_USER_LOGIN)"
      echo "aW1wb3J0IGpzb24sIHN5cwpwcmludChqc29uLmR1bXBzKHsKICAnaW1hZ2VfdXJsJzogc3lzLmFyZ3ZbMV0sCiAgJ3BsYXlib29rX3VybCc6IHN5cy5hcmd2WzJdLAogICdyZWdpc19jbGlfdmVyc2lvbic6IHN5cy5hcmd2WzNdLAogICdyZXF1ZXN0ZXJfaWQnOiBpbnQoc3lzLmFyZ3ZbNF0pLAogICdyZXF1ZXN0ZXJfbG9naW4nOiBzeXMuYXJndls1XSwKfSkpCg==" | base64 -d | python3 - "$IMAGE_URL" "$[[ inputs.playbook_url ]]" "$[[ inputs.regis_cli_version ]]" "$GITLAB_USER_ID" "$GITLAB_USER_LOGIN" > analysis-request.json

      git config --global user.name "GitLab CI"
      git config --global user.email "gitlab-ci@example.com"

      git checkout -b "$BRANCH_NAME"
      git add analysis-request.json
      git commit -m "chore: request analysis for $IMAGE_URL [skip ci]"

      # Push the branch
      git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$BRANCH_NAME"

      # Create MR via API to ensure correct reviewer/assignee
      # We set the requester as both assignee and reviewer
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"$BRANCH_NAME\",
          \"target_branch\": \"$CI_DEFAULT_BRANCH\",
          \"title\": \"Analysis Request: $IMAGE_URL\",
          \"description\": \"The analysis report will be exposed as an artifact in this Merge Request (see the 'Analysis Report' link) and committed to the \`reports/\` directory.\",
          \"reviewer_ids\": [${GITLAB_USER_ID}],
          \"remove_source_branch\": true
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"

      # Trigger the analysis pipeline explicitly with the correct image version
      # (the push above uses [skip ci] so no automatic pipeline is created)
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"ref\": \"$BRANCH_NAME\", \"variables\": [{\"key\": \"REGIS_CLI_IMAGE\", \"value\": \"$REGIS_CLI_IMAGE\"}]}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipeline"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""

# Phase 2: Analyze the image when the MR is opened/updated
analyze_image:
  stage: analyze
  image:
    name: $REGIS_CLI_IMAGE
    entrypoint: [""]
  before_script:
    - mkdir -p reports
  script:
    - |
      # Extract inputs from the committed file
      IMAGE_URL=$(python3 -c "import json; print(json.load(open('analysis-request.json'))['image_url'])")
      PLAYBOOK_URL=$(python3 -c "import json; print(json.load(open('analysis-request.json'))['playbook_url'])")
      REQUESTER_LOGIN=$(python3 -c "import json; print(json.load(open('analysis-request.json')).get('requester_login', '$GITLAB_USER_LOGIN'))")
      rm analysis-request.json
      echo "Analyzing $IMAGE_URL requested by $REQUESTER_LOGIN..."

      regis-cli analyze "$IMAGE_URL" \
        --site \
        --output-dir public \
        --playbook "$PLAYBOOK_URL" \
        --meta "trigger.user=$GITLAB_USER_LOGIN" \
        --meta "trigger.url=$CI_JOB_URL" \
        --meta "gitlab.mr_url=$CI_MERGE_REQUEST_URL" \
        --meta "gitlab.mr_id=$CI_MERGE_REQUEST_IID" \
        --meta "gitlab.mr=$CI_MERGE_REQUEST_IID"

      # Optional: Commit results and post link to MR if GITLAB_TOKEN is provided
      if [ -n "$GITLAB_TOKEN" ]; then
        echo "Pushing report to branch $CI_COMMIT_REF_NAME..."
        git config --global --add safe.directory "$CI_PROJECT_DIR"
        git config --global user.name "regis-cli bot"
        git config --global user.email "regis-cli@example.com"
        git add reports/
        git rm analysis-request.json || echo "Analysis request already removed"
        git commit -m "chore: update analysis report for $IMAGE_URL [skip ci]" || echo "No changes to commit"
        git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:${CI_COMMIT_REF_NAME}"

        if [ -n "$CI_MERGE_REQUEST_IID" ]; then
          REPORT_INDEX=$(find reports -name index.html | head -n 1)
          if [ -n "$REPORT_INDEX" ]; then
            REPORT_URL="${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/external_file/${REPORT_INDEX}"

            # Apply labels and checklist from report.json
            REPORT_JSON=$(find reports -name report.json | head -n 1)
            if [ -n "$REPORT_JSON" ]; then
              LABELS=$(python3 -c "import json; print(','.join(json.load(open('$REPORT_JSON')).get('labels', [])))")
              if [ -n "$LABELS" ]; then
                echo "Applying labels to MR: $LABELS"
                curl --fail --request PUT --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                  --data "add_labels=${LABELS}" \
                  "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
              fi

              # Append mr_description_checklist to MR description
              CHECKLIST=$(echo "aW1wb3J0IGpzb24sIHN5cwpkYXRhID0ganNvbi5sb2FkKG9wZW4oc3lzLmFyZ3ZbMV0pKQppdGVtcyA9IGRhdGEuZ2V0KCdtcl9kZXNjcmlwdGlvbl9jaGVja2xpc3QnLCBbXSkKaWYgaXRlbXM6CiAgICBwcmludCgnCgotLS0KCiMjIPCfk4sgUmV2aWV3IENoZWNrbGlzdAoKJyArICcKJy5qb2luKCctIFsgXSAnICsgaSBmb3IgaSBpbiBpdGVtcykpCg==" | base64 -d | python3 - "$REPORT_JSON")
              if [ -n "$CHECKLIST" ]; then
                echo "Appending checklist to MR description..."
                CURRENT_DESC=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                  "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" \
                  | python3 -c "import json,sys; print(json.load(sys.stdin).get('description','') or '')")
                printf '%s%s' "$CURRENT_DESC" "$CHECKLIST" \
                  | python3 -c "import json,sys; d=sys.stdin.read(); print(json.dumps({'description':d}))" > /tmp/mr_payload.json
                curl --fail --request PUT \
                  --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                  --header "Content-Type: application/json" \
                  --data "@/tmp/mr_payload.json" \
                  "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
              fi
            fi

            echo "Posting MR comment with link to report..."
            curl --fail --request POST --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"body\": \"🚀 **regis-cli Analysis Complete!**\n\nThe full HTML security report is ready: [View Analysis Report]($REPORT_URL)\"}" \
              "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
          fi
        fi
      fi
  artifacts:
    expose_as: Analysis Report
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Phase 3: Deploy to GitLab Pages (Default branch only)
pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Publishing to production pages"
  dependencies:
    - analyze_image
  pages:
    publish: reports
  artifacts:
    paths:
      - reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && "$[[ inputs.image_url ]]" != ""
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
