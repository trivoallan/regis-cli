name: Analyze Image

on:
  workflow_dispatch:
    inputs:
      # trunk-ignore(checkov/CKV_GHA_7)
      image:
        description: Image to analyze (e.g. nginx:latest or ghcr.io/user/repo:tag)
        required: true
      playbook:
        description: URL or path to a custom playbook (optional)
        required: false

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"

      - name: Run Analysis
        run: |
          # Use docker to run regis with the workspace mounted.
          # We use --user root to ensure we can write to the mounted volume
          docker run --rm \
            -v {% raw %}${{ github.workspace }}{% endraw %}":/app \
            -w /app \
            --user root \
            ghcr.io/trivoallan/regis:main \
            analyze "{% raw %}${{ github.event.inputs.image }}{% endraw %}" \
            --evaluate \
            --meta "trigger.user= {% raw %}${{ github.actor }}{% endraw %}" \
            --meta "trigger.url={% raw %}${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}{% endraw %}" \
            --output-dir {% raw %}${{ github.run_id }}{% endraw %}
            {% raw %}${{ github.event.inputs.playbook && format('--playbook {0}', github.event.inputs.playbook) || '' }}{% endraw %}

      - name: Fix permissions
        if: always()
        run: sudo chown -R $USER:$USER .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: "{% raw %}${{ secrets.REGIS_BOT_TOKEN || secrets.GITHUB_TOKEN }}{% endraw %}"
          commit-message: "chore: archive report for {% raw %}${{ github.event.inputs.image }}{% endraw %}"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: "{% raw %}${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>{% endraw %}"
          branch: "analyze/{% raw %}${{ github.run_id }}{% endraw %}"
          delete-branch: true
          title: "chore: archive report for {% raw %}${{ github.event.inputs.image }}{% endraw %}"
          body: |
            This PR adds a new security analysis report for **{% raw %}${{ github.event.inputs.image }}{% endraw %}** to the archive.

            Triggered by: @{% raw %}${{ github.actor }}{% endraw %}
            Run: {% raw %}${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}{% endraw %}
          base: main
