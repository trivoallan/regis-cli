# yaml-language-server: $schema=../(reference/schemas/playbook.schema.json
name: RegiS Default Playbook

tiers:
  - name: Gold
    condition:
      ">": [{ var: rules_summary.score }, 90]
  - name: Silver
    condition:
      ">": [{ var: rules_summary.score }, 70]
  - name: Bronze
    condition:
      ">": [{ var: rules_summary.score }, 50]

badges:
  - slug: score
    scope: Score
    value: ${rules_summary.score}
    class: information
  - slug: cve-critical
    scope: CVE
    value: Critical
    condition:
      "!!": [{ var: rules.trivy.no-critical.passed }]
    class: error
  - slug: cve-high
    scope: CVE
    value: High
    condition:
      "!!": [{ var: rules.trivy.no-high.passed }]
    class: warning
  - slug: freshness
    scope: Freshness
    value: Fresh !
    condition:
      "==": [{ var: rules.freshness.age.passed }, true]
    class: success

pages:
  - title: Overview
    slug: index
    sections:
      - name: ""
        widgets:
          - label: Recommandation
            value: "{{ 'GO' }}"
            options:
              class: recommandation-go
              align: center
            condition:
              ">=":
                [
                  {
                    var: playbooks.0.pages.compliance.sections.mandatory_requirements.score,
                  },
                  90,
                ]
          - label: Recommandation
            value: "{{ 'NOGO' }}"
            options:
              class: recommandation-nogo
              align: center
            condition:
              "<":
                [
                  {
                    var: playbooks.0.pages.compliance.sections.mandatory_requirements.score,
                  },
                  90,
                ]
      - name: ""
        widgets:
          - label: Overall Compliance
            value: "{{ playbooks.0.score }}%"
            url: compliance.html
            options:
              align: center
          - label: Mandatory Requirements
            value: "{{ playbooks.0.pages.compliance.sections.mandatory_requirements.passed_scorecards }} / {{ playbooks.0.pages.compliance.sections.mandatory_requirements.total_scorecards }}"
            url: compliance.html
            options:
              align: center
          - label: Recommended Requirements
            value: "{{ playbooks.0.pages.compliance.sections.recommended_requirements.passed_scorecards }} / {{ playbooks.0.pages.compliance.sections.recommended_requirements.total_scorecards }}"
            url: compliance.html
            options:
              align: center

      - name: Request
        widgets:
          - label: Creation Time
            value: "{{ request.timestamp | format_date }}"
            options:
              subvalue: "{{ request.timestamp | format_time }}"
          - label: Triggered by
            value: "{{ request.metadata.trigger.user | default('Unknown Emiter') }}"
            url: "{{ request.metadata.trigger.url | default('') }}"
          - label: Merge Request
            value: "!{{ request.metadata['gitlab.mr_id'] | default('N/A') }}"
            url: "{{ request.metadata['gitlab.mr_url'] }}"
            condition: { "!!": [{ var: request.metadata.gitlab.mr_url }] }
          - template: request/table.html
            options:
              title: Request Parameters
          - template: metadata/table.html
            options:
              title: Additional Metadata
            condition:
              "!!": [{ var: request.metadata }]

      - name: Requested Image
        widgets:
          - label: Registry
            value: "{{ request.registry }}"
          - label: Repository
            value: "{{ request.repository }}"
          - label: Tag
            value: "{{ request.tag }}"

  - title: Compliance
    slug: compliance
    sections:
      - name: " "
        widgets:
          - label: Overall Compliance
            value: "{{ playbooks.0.score }}%"
            options:
              align: center
          - label: Mandatory Requirements
            value: "{{ playbooks.0.pages.compliance.sections.mandatory_requirements.score }}%"
            options:
              align: center
          - label: Recommended Requirements
            value: "{{ playbooks.0.pages.compliance.sections.recommended_requirements.score }}%"
            options:
              align: center
      - name: Mandatory Requirements
        rules:
          - core.registry-domain-whitelist
          - skopeo.no-root
          - trivy.no-critical
          - dockle.no-fatal
          - trivy.fix-available
          - trivy.secret-scan

      - name: Recommended Requirements
        rules:
          - trivy.no-high
          - freshness.age
          - skopeo.max-size
          - skopeo.max-layers
          - skopeo.tag-not-latest
          - skopeo.required-labels

  - title: Security
    slug: security
    sections:
      - name: Vulnerabilities
        widgets:
          - template: analyzers/trivy/cards.html
          - template: analyzers/trivy/table.html
            options:
              title: Top HIGH and CRITICAL vulnerabilities
              collapsed: true
              limit: 25
      - name: Provenance
        widgets:
          - template: analyzers/provenance/cards.html
          - template: analyzers/provenance/table.html
            options:
              title: Provenance Details
              collapsed: true

  - title: Supply Chain & Quality
    slug: supply-chain
    sections:
      - name: Software Bill of Materials (SBOM)
        widgets:
          - template: analyzers/sbom/cards.html
          - template: analyzers/sbom/table.html
            options:
              title: Component Inventory Preview
              collapsed: true
              limit: 50

      - name: OpenSSF Scorecard
        widgets:
          - template: analyzers/scorecarddev/cards.html
          - template: analyzers/scorecarddev/table.html
            options:
              title: Detailed Check Results
              collapsed: true

  - title: Best Practices
    slug: best-practices
    sections:
      - name: Dockerfile Linting (Hadolint)
        widgets:
          - template: analyzers/hadolint/cards.html
          - template: analyzers/hadolint/table.html
            options:
              title: Linting Issues & Recommendations
              collapsed: true

      - name: Security & Best Practices (Dockle)
        widgets:
          - template: analyzers/dockle/cards.html
          - template: analyzers/dockle/table.html
            options:
              title: Security Issues & Recommendations
              collapsed: true

  - title: Insights & Lifecycle
    slug: insights
    sections:
      - name: Image Freshness
        widgets:
          - template: analyzers/freshness/cards.html
          - template: analyzers/freshness/table.html
            options:
              title: Release Details
              collapsed: true

      - name: Popularity & Community
        widgets:
          - label: Pulls
            value: "{{ results.popularity.pull_count | format_number }}"
          - label: Stars
            value: "{{ results.popularity.star_count | format_number }}"
          - template: analyzers/popularity/table.html
            options:
              title: Registry Stats
              collapsed: true

      - name: Lifecycle (EndOfLife)
        widgets:
          - template: analyzers/endoflife/cards.html
          - template: analyzers/endoflife/table.html
            options:
              title: Version Support Status
              collapsed: true

  - title: Technical Details
    slug: metadata
    sections:
      - name: Size & Layers
        widgets:
          - template: analyzers/size/cards.html
          - template: analyzers/size/table.html
            options:
              title: Layer Distribution
              collapsed: true

      - name: Skopeo Inspection
        widgets:
          - template: analyzers/skopeo/cards.html
          - template: analyzers/skopeo/table.html
            options:
              title: Platforms & Tags
              collapsed: true

      - name: Versioning Analysis
        widgets:
          - template: analyzers/versioning/cards.html
          - template: analyzers/versioning/table.html
            options:
              title: Tag Logic & Patterns
              collapsed: true

integrations:
  gitlab:
    badges:
      - score
      - freshness
      - cve-critical
      - cve-high
    checklists:
      - title: 📝 Review Checklist
        items:
          - label: Revue de sécurité réalisée
          - label: Aucune vulnérabilité CRITIQUE détectée
            show_if: { var: rules.trivy.no-critical.passed }
            check_if: { var: rules.trivy.no-critical.passed }
          - label: Image issue d'un registre de confiance
            show_if: { var: rules.core.registry-domain-whitelist.passed }
            check_if: { var: rules.core.registry-domain-whitelist.passed }
    templates:
      - url: https://github.com/trivoallan/regis-cli
        directory: regis_cli/cookiecutters/mr-evidence

links:
  - label: Return to Merge Request
    url: "{{ request.metadata['gitlab.mr_url'] }}"
    condition: { "!!": [{ var: request.metadata.gitlab.mr_url }] }
