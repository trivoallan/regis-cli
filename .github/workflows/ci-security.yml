name: CI / Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pipenv

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv sync --dev

      - name: Run pip-audit (HIGH/CRITICAL gate)
        run: |
          pipenv requirements > requirements-ci.txt
          pipenv run pip install pip-audit
          set +e
          pipenv run pip-audit -r requirements-ci.txt --format=json --output pip-audit-report.json
          audit_exit_code=$?
          set -e
          if [ ! -s pip-audit-report.json ]; then
            echo "pip-audit did not produce JSON output"
            exit 1
          fi
          python scripts/enforce_pip_audit_severity.py pip-audit-report.json --min-severity HIGH
          if [ "$audit_exit_code" -ne 0 ]; then
            echo "pip-audit reported vulnerabilities; severity gate applied above"
          fi

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 14
          if-no-files-found: warn
