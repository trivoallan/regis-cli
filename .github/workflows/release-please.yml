name: Release / Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).head_branch }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install Trunk
        if: ${{ steps.release.outputs.pr }}
        uses: trunk-io/trunk-action/install@75699af9e26881e564e9d832ef7dc3af25ec031b # v1.2.4

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.pr }}
        run: |
          trunk fmt CHANGELOG.md
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "style(changelog): run trunk fmt on CHANGELOG.md" || echo "No changes to commit"
          git push
