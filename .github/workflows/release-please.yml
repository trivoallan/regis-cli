name: Release / Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).head_branch }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install Trunk
        if: ${{ steps.release.outputs.pr }}
        uses: trunk-io/trunk-action/install@v1

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.pr }}
        run: |
          trunk fmt CHANGELOG.md
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "style(changelog): run trunk fmt on CHANGELOG.md" || echo "No changes to commit"
          git push
