name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).head_branch }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Trunk
        if: ${{ steps.release.outputs.pr }}
        uses: trunk-io/trunk-action/install@v1

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.pr }}
        run: |
          trunk fmt CHANGELOG.md
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "style(changelog): run trunk fmt on CHANGELOG.md" || echo "No changes to commit"
          git push
