name: CI / Action dogfood

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true@

jobs:
  dogfood:
    name: regis-security-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Analyze ghcr.io/trivoallan/regis:latest
        uses: trivoallan/regis@v0.29.0
        with:
          image-url: ghcr.io/trivoallan/regis:latest
          version: v0.29.0
