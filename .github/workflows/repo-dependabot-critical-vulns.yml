name: Repo / Dependabot critical vulns

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  filter-dependabot-prs:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      security-events: read
    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        continue-on-error: true
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ steps.generate-token.outputs.token || github.token }}
          alert-lookup: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Close PR when metadata lookup fails
        if: steps.dependabot-metadata.outcome != 'success'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr close "$PR_NUMBER" --repo "$REPO" --comment "Closing automatically: Dependabot metadata lookup failed, so CVSS could not be verified for critical-only policy."

      - name: Close non-critical Dependabot PRs
        if: steps.dependabot-metadata.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CVSS: ${{ steps.dependabot-metadata.outputs.cvss }}
          CRITICAL_CVSS_THRESHOLD: "9.0"
        run: |
          cvss_value="${CVSS:-0}"
          if [ "$cvss_value" = "null" ] || [ -z "$cvss_value" ]; then
            cvss_value="0"
          fi

          export CVSS_VALUE="$cvss_value"
          decision="$(python3 - <<'PY'
          import os

          raw_value = os.environ.get("CVSS_VALUE", "0")
          threshold = float(os.environ["CRITICAL_CVSS_THRESHOLD"])
          try:
              score = float(raw_value)
          except (TypeError, ValueError):
              print(f"keep: Could not parse CVSS '{raw_value}'.")
          else:
              if score < threshold:
                  print(f"close: CVSS {score} is below critical threshold {threshold}.")
              else:
                  print(f"keep: CVSS {score} meets critical threshold {threshold}.")
          PY
          )"
          echo "$decision"

          if [[ "$decision" == close:* ]]; then
            reason="${decision#close: }"
            gh pr close "$PR_NUMBER" --repo "$REPO" --comment "Closing automatically: $reason Only critical vulnerability updates (CVSS >= $CRITICAL_CVSS_THRESHOLD) are kept open."
          fi
