name: Sync Archive Template

on:
  push:
    branches: [main]
    paths:
      - apps/report-viewer/src/**
      - apps/report-viewer/docusaurus.config.ts
      - apps/report-viewer/tailwind.config.js
      - apps/report-viewer/postcss.config.js
      - apps/report-viewer/tsconfig.json
      - apps/report-viewer/package.json
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Sync report-viewer → cookiecutter template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install regis-cli
        run: pip install -e ".[dev]"

      - name: Run sync
        id: sync
        run: |
          regis-cli bootstrap archive --sync-from apps/report-viewer 2>&1 | tee /tmp/sync-output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/sync-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open sync PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-archive-template
          delete-branch: true
          commit-message: "chore(templates): sync archive template from report-viewer"
          title: "chore(templates): sync archive cookiecutter from report-viewer"
          body: |
            ## Automatic Template Sync

            This PR was opened automatically by the `sync-archive-template` workflow.

            It syncs changes made to `apps/report-viewer/src/` back into the
            `regis_cli/cookiecutters/archive/` template using:

            ```
            regis-cli bootstrap archive --sync-from apps/report-viewer
            ```

            ### Sync output

            ```
            ${{ steps.sync.outputs.output }}
            ```

            > **Note**: Files containing Jinja2 block tags (`{%...%}`) are skipped
            > and may require manual review.
          labels: |
            templates
            automated
