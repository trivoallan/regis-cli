name: CD / Dashboard

on:
  push:
    branches:
      - main
    paths:
      - apps/dashboard/**
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: dashboard-publish
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Determine deploy path and base URL
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "deploy_path=tools/${VERSION}/dashboard" >> "$GITHUB_OUTPUT"
            echo "base_url=/regis/tools/${VERSION}/dashboard/" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_path=tools/main/dashboard" >> "$GITHUB_OUTPUT"
            echo "base_url=/regis/tools/main/dashboard/" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build Dashboard
        run: pnpm run build
        working-directory: apps/dashboard
        env:
          REPORT_URL: https://trivoallan.github.io
          REPORT_BASE_URL: ${{ steps.meta.outputs.base_url }}

      - name: Deploy Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ steps.generate-token.outputs.token }}
          publish_dir: apps/dashboard/build
          destination_dir: ${{ steps.meta.outputs.deploy_path }}
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "ci(dashboard): deploy dashboard to ${{ steps.meta.outputs.deploy_path }}"
