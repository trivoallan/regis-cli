name: Release / Docs snapshot

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshot-pending:
    # Run on published release or manual dispatch. The snapshot must run off
    # `main` AFTER the release-please PR is merged and the GitHub release is
    # cut — never on top of the release-please branch, because squash-merging
    # such a PR would rewrite the `chore(main): release X.Y.Z` title and
    # break release-please's boundary detection on the next run.
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            release)
              VERSION=$(echo "$RELEASE_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              ;;
            workflow_dispatch)
              # Auto-detect the latest released git tag that has not yet
              # been snapshotted in docs/website/versions.json.
              git fetch --tags --force --quiet
              LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
              CANDIDATE=$(echo "$LATEST_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              if [ -n "$CANDIDATE" ] && grep -q "\"v${CANDIDATE}\"" docs/website/versions.json; then
                echo "::error::Latest tag v${CANDIDATE} is already in versions.json; nothing to snapshot."
                exit 1
              fi
              VERSION="$CANDIDATE"
              ;;
          esac
          if [ -z "${VERSION:-}" ]; then
            echo "::error::Could not determine version (event=$EVENT_NAME, tag='$RELEASE_TAG')"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: v${VERSION}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install docs dependencies
        run: pnpm install --filter docs

      - name: Create version snapshot
        working-directory: docs/website
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [ -d "versioned_docs/version-${VERSION}" ]; then
            echo "Snapshot for ${VERSION} already exists, skipping."
            exit 0
          fi
          pnpm run docusaurus docs:version "$VERSION"
          # Validate that all three artifacts were created
          if [ ! -d "versioned_docs/version-${VERSION}" ]; then
            echo "::error::versioned_docs/version-${VERSION} was not created"
            exit 1
          fi
          if [ ! -f "versioned_sidebars/version-${VERSION}-sidebars.json" ]; then
            echo "::error::versioned_sidebars/version-${VERSION}-sidebars.json was not created"
            exit 1
          fi
          if ! grep -q "\"${VERSION}\"" versions.json; then
            echo "::error::versions.json does not contain ${VERSION}"
            exit 1
          fi
          echo "Snapshot for ${VERSION} created and validated successfully."

      - name: Commit snapshot to branch and open PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "regis-ci[bot]"
          git config user.email "regis-ci[bot]@users.noreply.github.com"
          git add \
            docs/website/versioned_docs/ \
            docs/website/versioned_sidebars/ \
            docs/website/versions.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          BRANCH="docs/snapshot-${VERSION}"
          git checkout -b "${BRANCH}"
          git commit -m "docs: create ${VERSION} documentation snapshot"

          # Force-push so that a retried run replaces any stale attempt on the
          # same branch instead of failing with "non-fast-forward".
          if ! git push --force-with-lease -u origin "${BRANCH}"; then
            echo "::error::Failed to push snapshot branch ${BRANCH}"
            exit 1
          fi

          # If a PR is already open for this branch, we're done.
          if gh pr view "${BRANCH}" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR for ${BRANCH} already open, skipping create."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "docs: create ${VERSION} documentation snapshot" \
            --body "Automated Docusaurus snapshot for ${VERSION}. Generated by release-snapshot workflow."
          echo "Snapshot PR opened for ${VERSION}."
