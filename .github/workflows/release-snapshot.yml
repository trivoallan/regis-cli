name: Release / Docs snapshot

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: release-snapshot-${{ github.event.release.tag_name || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_minor: ${{ steps.version.outputs.is_minor }}
    steps:
      - name: Checkout branch

        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version and check patch component
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            release)
              VERSION=$(echo "$RELEASE_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              ;;
            workflow_dispatch)
              git fetch --tags --force --quiet
              LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
              VERSION=$(echo "$LATEST_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              ;;
          esac
          if [ -z "${VERSION:-}" ]; then
            echo "::error::Could not determine version (event=$EVENT_NAME, tag='$RELEASE_TAG')"
            exit 1
          fi
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ "$PATCH" -eq 0 ]; then
            IS_MINOR=true
          else
            IS_MINOR=false
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_minor=${IS_MINOR}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION}, patch=${PATCH}, is_minor=${IS_MINOR}"

  snapshot-pending:
    needs: [check-version]
    if: needs.check-version.outputs.is_minor == 'true'
    # Run on published release or manual dispatch. The snapshot must run off
    # `main` AFTER the release-please PR is merged and the GitHub release is
    # cut — never on top of the release-please branch, because squash-merging
    # such a PR would rewrite the `chore(main): release X.Y.Z` title and
    # break release-please's boundary detection on the next run.
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            release)
              VERSION=$(echo "$RELEASE_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              ;;
            workflow_dispatch)
              # Auto-detect the latest released git tag that has not yet
              # been snapshotted in docs/website/versions.json.
              git fetch --tags --force --quiet
              LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
              CANDIDATE=$(echo "$LATEST_TAG" | grep -oP '\d+\.\d+\.\d+' || true)
              if [ -n "$CANDIDATE" ] && grep -q "\"v${CANDIDATE}\"" docs/website/versions.json; then
                echo "::error::Latest tag v${CANDIDATE} is already in versions.json; nothing to snapshot."
                exit 1
              fi
              VERSION="$CANDIDATE"
              ;;
          esac
          if [ -z "${VERSION:-}" ]; then
            echo "::error::Could not determine version (event=$EVENT_NAME, tag='$RELEASE_TAG')"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: v${VERSION}"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install docs dependencies
        run: pnpm install --filter docs --frozen-lockfile

      - name: Create version snapshot
        working-directory: docs/website
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [ -d "versioned_docs/version-${VERSION}" ]; then
            echo "Snapshot for ${VERSION} already exists, skipping."
            exit 0
          fi
          pnpm run docusaurus docs:version "$VERSION"
          # Validate that all three artifacts were created
          if [ ! -d "versioned_docs/version-${VERSION}" ]; then
            echo "::error::versioned_docs/version-${VERSION} was not created"
            exit 1
          fi
          if [ ! -f "versioned_sidebars/version-${VERSION}-sidebars.json" ]; then
            echo "::error::versioned_sidebars/version-${VERSION}-sidebars.json was not created"
            exit 1
          fi
          if ! grep -q "\"${VERSION}\"" versions.json; then
            echo "::error::versions.json does not contain ${VERSION}"
            exit 1
          fi
          echo "Snapshot for ${VERSION} created and validated successfully."

      - name: Prune old version snapshots
        working-directory: docs/website
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, shutil, pathlib, sys

          versions_file = pathlib.Path("versions.json")
          versions = json.loads(versions_file.read_text())

          while len(versions) > 3:
              oldest = versions.pop()
              print(f"Pruning old snapshot: {oldest}")
              doc_dir = pathlib.Path(f"versioned_docs/version-{oldest}")
              sidebar_file = pathlib.Path(f"versioned_sidebars/version-{oldest}-sidebars.json")
              if doc_dir.exists():
                  shutil.rmtree(doc_dir)
                  print(f"  Deleted {doc_dir}")
              if sidebar_file.exists():
                  sidebar_file.unlink()
                  print(f"  Deleted {sidebar_file}")

          versions_file.write_text(json.dumps(versions, indent=2) + "\n")
          print(f"versions.json now contains {len(versions)} entries: {versions}")
          EOF


      - name: Write snapshot-dates sidecars
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'EOF'
          import json, pathlib, datetime, os

          version = os.environ["VERSION"]
          today = datetime.date.today().isoformat()

          web_file = pathlib.Path("docs/website/snapshot-dates.json")
          dates = json.loads(web_file.read_text()) if web_file.exists() else {}
          dates[version] = {"date": today}
          web_file.write_text(json.dumps(dates, indent=2) + "\n")
          print(f"Updated docs/website/snapshot-dates.json: {version} = {today}")

          pkg_file = pathlib.Path("regis/data/snapshot_dates.json")
          pkg_file.write_text(json.dumps(dates, indent=2) + "\n")
          print(f"Updated regis/data/snapshot_dates.json: {version} = {today}")
          EOF

      - name: Commit snapshot to branch and open PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "regis-ci[bot]"
          git config user.email "regis-ci[bot]@users.noreply.github.com"
          git add \
            docs/website/versioned_docs/ \
            docs/website/versioned_sidebars/ \
            docs/website/versions.json \
            docs/website/snapshot-dates.json \
            regis/data/snapshot_dates.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          BRANCH="docs/snapshot-${VERSION}"
          git checkout -b "${BRANCH}"
          git commit -m "docs: create ${VERSION} documentation snapshot"

          # Force-push so that a retried run replaces any stale attempt on the
          # same branch instead of failing with "non-fast-forward".
          if ! git push --force-with-lease -u origin "${BRANCH}"; then
            echo "::error::Failed to push snapshot branch ${BRANCH}"
            exit 1
          fi

          # If a PR is already open for this branch, we're done.
          if gh pr view "${BRANCH}" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR for ${BRANCH} already open, skipping create."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "docs: create ${VERSION} documentation snapshot" \
            --body "Automated Docusaurus snapshot for ${VERSION}. Generated by release-snapshot workflow."
          echo "Snapshot PR opened for ${VERSION}."
