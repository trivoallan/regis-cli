name: CI / Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pipenv

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv sync --dev

      - name: Get pipenv virtualenv path
        id: pipenv-venv
        run: echo "path=$(pipenv --venv)" >> "$GITHUB_OUTPUT"

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: ${{ steps.pipenv-venv.outputs.path }}

      - name: Diagnostic - check environment
        run: |
          pipenv run pip list
          pipenv run python -c "import cookiecutter; print('cookiecutter import ok')"

      - name: Run pytest
        run: pipenv run pytest

      - name: Generate coverage badge
        if: always()
        continue-on-error: true
        run: pipenv run genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage-badge.svg
          retention-days: 14
          if-no-files-found: warn
