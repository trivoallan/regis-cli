name: CI / Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pipenv

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv sync --dev

      - name: Get pipenv virtualenv path
        id: pipenv-venv
        run: echo "path=$(pipenv --venv)" >> "$GITHUB_OUTPUT"

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: ${{ steps.pipenv-venv.outputs.path }}
          internal-be-careful-allow-failure: true
          internal-be-careful-extra-flags: --format json --output pip-audit-report.json

      - name: Enforce HIGH/CRITICAL severity gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          if not os.path.exists("pip-audit-report.json") or os.path.getsize("pip-audit-report.json") == 0:
              print(
                  "pip-audit report was not generated or is empty; "
                  "verify the gh-action-pip-audit run and output path."
              )
              sys.exit(1)

          with open("pip-audit-report.json", encoding="utf-8") as report_file:
              report = json.load(report_file)

          dependencies = report.get("dependencies", [])
          vulnerabilities = []
          for dependency in dependencies:
              for vulnerability in dependency.get("vulns", []):
                  vulnerabilities.append(
                      {
                          "package": dependency["name"],
                          "version": dependency["version"],
                          "id": vulnerability["id"],
                          "aliases": vulnerability.get("aliases", []),
                      }
                  )

          if not vulnerabilities:
              print("pip-audit completed: no vulnerabilities detected.")
              sys.exit(0)

          token = os.environ.get("GITHUB_TOKEN", "")
          if not token:
              print("GITHUB_TOKEN is required for advisory severity lookups.")
              sys.exit(1)

          high_or_critical = []
          lookup_failures = []
          for vulnerability in vulnerabilities:
              ghsa = next(
                  (alias for alias in vulnerability["aliases"] if alias.startswith("GHSA-")),
                  None,
              )
              if not ghsa:
                  lookup_failures.append(
                      f"{vulnerability['id']}: missing GHSA alias (cannot resolve severity)"
                  )
                  continue

              request = urllib.request.Request(
                  f"https://api.github.com/advisories/{ghsa}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Authorization": f"Bearer {token}",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      advisory = json.loads(response.read().decode("utf-8"))
              except (urllib.error.URLError, urllib.error.HTTPError) as error:
                  lookup_failures.append(f"{ghsa}: {error}")
                  continue

              severity = advisory.get("severity", "").lower().strip()
              if not severity:
                  lookup_failures.append(
                      f"{ghsa}: advisory response missing severity (unexpected API payload)"
                  )
                  continue
              if severity in {"high", "critical"}:
                  high_or_critical.append(
                      {
                          **vulnerability,
                          "ghsa": ghsa,
                          "severity": severity,
                          "summary": advisory.get("summary", ""),
                      }
                  )

          if high_or_critical:
              print("pip-audit found HIGH/CRITICAL vulnerabilities:")
              for vulnerability in high_or_critical:
                  print(
                      f"- {vulnerability['package']}=={vulnerability['version']}: "
                      f"{vulnerability['id']} ({vulnerability['ghsa']}, "
                      f"severity={vulnerability['severity']}) {vulnerability['summary']}"
                  )
              sys.exit(1)

          if lookup_failures:
              print("Could not retrieve severity for one or more advisories:")
              for failure in lookup_failures:
                  print(f"- {failure}")
              print("Failing pipeline because severity evaluation is incomplete.")
              sys.exit(1)

          print(
              "pip-audit completed: no HIGH/CRITICAL vulnerabilities detected "
              f"(total findings: {len(vulnerabilities)})."
          )
          PY

      - name: Diagnostic - check environment
        run: |
          pipenv run pip list
          pipenv run python -c "import cookiecutter; print('cookiecutter import ok')"

      - name: Run pytest
        run: pipenv run pytest

      - name: Generate coverage badge
        if: always()
        continue-on-error: true
        run: pipenv run genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage-badge.svg
          retention-days: 14
          if-no-files-found: warn
