name: CI / Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pipenv

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv sync --dev

      - name: Install pip-audit
        run: pipenv run pip install pip-audit

      - name: Run pip-audit (fail on HIGH/CRITICAL)
        run: |
          set -euo pipefail
          pipenv run pip-audit -f json > pip-audit-report.json || true

          python - <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          with open("pip-audit-report.json", encoding="utf-8") as report_file:
              report = json.load(report_file)

          dependencies = report.get("dependencies", [])
          vulnerabilities = []
          for dependency in dependencies:
              for vulnerability in dependency.get("vulns", []):
                  vulnerabilities.append(
                      {
                          "package": dependency["name"],
                          "version": dependency["version"],
                          "id": vulnerability["id"],
                          "aliases": vulnerability.get("aliases", []),
                      }
                  )

          high_or_critical = []
          for vulnerability in vulnerabilities:
              ghsa = next(
                  (alias for alias in vulnerability["aliases"] if alias.startswith("GHSA-")),
                  None,
              )
              if not ghsa:
                  continue

              request = urllib.request.Request(
                  f"https://api.github.com/advisories/{ghsa}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      advisory = json.loads(response.read().decode("utf-8"))
              except (urllib.error.URLError, urllib.error.HTTPError) as error:
                  print(f"Warning: could not retrieve severity for {ghsa}: {error}")
                  continue

              severity = advisory.get("severity", "").lower()
              if severity in {"high", "critical"}:
                  high_or_critical.append(
                      {
                          **vulnerability,
                          "ghsa": ghsa,
                          "severity": severity,
                          "summary": advisory.get("summary", ""),
                      }
                  )

          if high_or_critical:
              print("pip-audit found HIGH/CRITICAL vulnerabilities:")
              for vulnerability in high_or_critical:
                  print(
                      "- {package}=={version}: {id} ({ghsa}, severity={severity}) {summary}".format(
                          **vulnerability
                      )
                  )
              sys.exit(1)

          print(
              "pip-audit completed: no HIGH/CRITICAL vulnerabilities detected "
              f"(total findings: {len(vulnerabilities)})."
          )
          PY

      - name: Diagnostic - check environment
        run: |
          pipenv run pip list
          pipenv run python -c "import cookiecutter; print('cookiecutter import ok')"

      - name: Run pytest
        run: pipenv run pytest

      - name: Generate coverage badge
        if: always()
        continue-on-error: true
        run: pipenv run genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage-badge.svg
          retention-days: 14
          if-no-files-found: warn
