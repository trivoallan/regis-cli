name: CI / Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trunk:
    name: Trunk Check
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read
      statuses: write
      checks: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Trunk Install
        uses: trunk-io/trunk-action/setup@v1

      - name: Trunk Format
        run: ${{ env.TRUNK_PATH }} fmt

      - name: Commit and Push Formatting Fixes
        if: github.event_name == 'pull_request'
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.head_ref }}
          commit_message: "style: apply automated trunk fmt"
          commit_options: "--no-verify"
          commit_user_name: regis-ci[bot]
          commit_user_email: regis-ci[bot]@users.noreply.github.com
          commit_author: regis-ci[bot] <regis-ci[bot]@users.noreply.github.com>

      - name: Fail if formatting fixes were needed
        if: steps.commit.outputs.changes_detected == 'true'
        run: |
          echo "::error::Formatting issues were auto-fixed and committed to your branch. A new CI run will start — no action needed."
          exit 1

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1

  docs-links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request'
      && (
        contains(join(github.event.pull_request.labels.*.name, ','), 'docs')
        || true
      )
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path docs/website/versioned_docs
            --exclude-path docs/website/node_modules
            --exclude 'pathname:///'
            --exclude 'http://localhost'
            --exclude 'https://example.com'
            --exclude 'regis\.example\.com'
            --exclude 'my-private-registry\.example\.com'
            --exclude 'host\.example\.com'
            --exclude '\.schema\.md'
            docs/website/docs/
          fail: true
