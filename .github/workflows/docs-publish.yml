name: Publish Documentation

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - docs/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv sync --dev

      - name: Install Hadolint
        run: |
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then hadolint_arch="x86_64"; else hadolint_arch="arm64"; fi
          sudo curl -sSfL "https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-${hadolint_arch}" -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install Dockle
        run: |
          DOCKLE_VERSION="0.4.15"
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then dockle_arch="64bit"; else dockle_arch="ARM64"; fi
          curl -L -o dockle.tar.gz https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-${dockle_arch}.tar.gz
          tar zxvf dockle.tar.gz dockle
          sudo mv dockle /usr/local/bin/dockle
          rm dockle.tar.gz
          sudo chmod +x /usr/local/bin/dockle

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate Schema Docs
        run: |
          for cat in $(find regis_cli/schemas/* -maxdepth 0 -type d); do
            cat=$(basename $cat);
            mkdir -p docs/website/static/schemas/$cat
            rm -fv ./docs/website/static/schemas/$cat/*.schema.json
            cp -v ./regis_cli/schemas/$cat/*.schema.json ./docs/website/static/schemas/$cat/
            mkdir -p docs/website/docs/reference/schemas/$cat
            pipenv run generate-schema-doc --config-file docs/website/json-schema-for-humans.config.json docs/website/static/schemas/$cat docs/website/docs/reference/schemas/$cat
          done

      - name: Generate Example Reports
        run: |
          mkdir -p docs/website/examples/playbooks/default
          pipenv run regis-cli analyze --evaluate alpine:latest -s -D docs/website/examples/playbooks/default/alpine
          pipenv run regis-cli analyze --evaluate ghcr.io/trivoallan/regis-cli:v0.15.0 -s -D docs/website/examples/playbooks/default/regis-cli

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install
        working-directory: docs/website

      - name: Build Docusaurus Site
        run: pnpm run build
        working-directory: docs/website

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
