name: Publish Documentation

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - apps/report-viewer/docs/**
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: docs-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv sync --dev

      - name: Install Hadolint
        run: |
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then hadolint_arch="x86_64"; else hadolint_arch="arm64"; fi
          sudo curl -sSfL "https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-${hadolint_arch}" -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install Dockle
        run: |
          DOCKLE_VERSION="0.4.15"
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then dockle_arch="64bit"; else dockle_arch="ARM64"; fi
          curl -L -o dockle.tar.gz https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-${dockle_arch}.tar.gz
          tar zxvf dockle.tar.gz dockle
          sudo mv dockle /usr/local/bin/dockle
          rm dockle.tar.gz
          sudo chmod +x /usr/local/bin/dockle

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Schema Docs
        run: |
          # Copy all schemas first to allow cross-category resolution
          mkdir -p docs/website/static/schemas
          cp -rv regis_cli/schemas/* docs/website/static/schemas/
          # Clean up any non-JSON files (like __init__.py) inadvertently copied
          find docs/website/static/schemas/ -type f ! -name "*.json" -delete

          for cat in $(find regis_cli/schemas/* -maxdepth 0 -type d); do
            cat=$(basename $cat);
            mkdir -p docs/website/docs/reference/schemas/$cat
            pipenv run generate-schema-doc --config-file docs/website/json-schema-for-humans.config.json docs/website/static/schemas/$cat docs/website/docs/reference/schemas/$cat
          done

      - name: Generate Rules Reference
        run: pipenv run regis-cli rules list -f markdown -D docs/website/docs/reference/rules

      - name: Generate Default Archive
        run: |
          mkdir -p docs/website/static/archives/default
          pipenv run regis-cli analyze --evaluate alpine:latest -A docs/website/static/archives/default/
          pipenv run regis-cli analyze --evaluate ghcr.io/trivoallan/regis-cli:latest -A docs/website/static/archives/default/
          pipenv run regis-cli analyze --evaluate ghcr.io/trivoallan/regis-cli:main -A docs/website/static/archives/default/

      - name: Create Docusaurus version snapshot
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ ! -d "docs/website/versioned_docs/version-${VERSION}" ]; then
            cd docs/website && pnpm run docusaurus docs:version "$VERSION"
          else
            echo "Snapshot for $VERSION already exists, skipping."
          fi

      - name: Docusaurus build
        run: pnpm run build
        working-directory: docs/website

      - name: Create Pull Request for documentation updates
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          commit-message: "docs: update documentation reference and snapshots"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: docs/automated-updates
          delete-branch: true
          title: "docs: update documentation reference and snapshots"
          body: |
            Automated documentation updates:
            - Generated latest JSON Schema reference
            - Generated latest Rules reference
            ${{ github.event_name == 'release' && '- Created Docusaurus version snapshot' || '' }}

            This PR ensures the documentation reflects the latest codebase.
          add-paths: |
            docs/website/docs/reference/rules/**
            docs/website/docs/reference/schemas/**
            docs/website/static/schemas/**
            docs/website/versioned_docs/**
            docs/website/versioned_sidebars/**
            docs/website/versions.json

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/website/build
          destination_dir: docs
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "ci(docs): deploy documentation"
