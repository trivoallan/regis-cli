name: Publish Documentation

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - docs/**
      - antora-playbook.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv sync --dev

      - name: Install Hadolint
        run: |
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then hadolint_arch="x86_64"; else hadolint_arch="arm64"; fi
          sudo curl -sSfL "https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-${hadolint_arch}" -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install Dockle
        run: |
          DOCKLE_VERSION="0.4.15"
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then dockle_arch="64bit"; else dockle_arch="ARM64"; fi
          curl -L -o dockle.tar.gz https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-${dockle_arch}.tar.gz
          tar zxvf dockle.tar.gz dockle
          sudo mv dockle /usr/local/bin/dockle
          rm dockle.tar.gz
          sudo chmod +x /usr/local/bin/dockle

      - name: Generate Schema Docs
        run: pipenv run python scripts/generate_schema_docs.py

      - name: Generate Example Reports
        run: pipenv run python scripts/generate_example_reports.py

      - name: Install Antora
        run: npm install @antora/cli@3.1 @antora/site-generator@3.1 @sntke/antora-mermaid-extension

      - name: Build Antora Site
        run: npx antora antora-playbook.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
