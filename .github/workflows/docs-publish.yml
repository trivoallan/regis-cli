name: Publish Documentation

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - docs/**
      - antora-playbook.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv install --dev

      - name: Generate Schema Docs
        run: pipenv run python scripts/generate_schema_docs.py

      - name: Generate Example Reports
        run: pipenv run python scripts/generate_example_reports.py

      - name: Install Antora
        run: npm install @antora/cli@3.1 @antora/site-generator@3.1 @sntke/antora-mermaid-extension

      - name: Build Antora Site
        run: npx antora antora-playbook.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
