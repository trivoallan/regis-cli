name: CD / Docs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write

concurrency:
  group: docs-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REGIS_CI_APP_ID }}
          private-key: ${{ secrets.REGIS_CI_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv sync --dev

      - name: Install Hadolint
        run: |
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then hadolint_arch="x86_64"; else hadolint_arch="arm64"; fi
          sudo curl -sSfL "https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-${hadolint_arch}" -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install Dockle
        run: |
          DOCKLE_VERSION="0.4.15"
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then dockle_arch="64bit"; else dockle_arch="ARM64"; fi
          curl -L -o dockle.tar.gz https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-${dockle_arch}.tar.gz
          tar zxvf dockle.tar.gz dockle
          sudo mv dockle /usr/local/bin/dockle
          rm dockle.tar.gz
          sudo chmod +x /usr/local/bin/dockle

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Schema Docs
        run: |
          # Copy all schemas first to allow cross-category resolution
          mkdir -p docs/website/static/schemas
          cp -rv regis/schemas/* docs/website/static/schemas/
          # Clean up any non-JSON files (like __init__.py) inadvertently copied
          find docs/website/static/schemas/ -type f ! -name "*.json" -delete

          for cat in $(find regis/schemas/* -maxdepth 0 -type d); do
            cat=$(basename $cat);
            mkdir -p docs/website/docs/reference/schemas/$cat
            pipenv run generate-schema-doc --config-file docs/website/json-schema-for-humans.config.json docs/website/static/schemas/$cat docs/website/docs/reference/schemas/$cat
          done

      - name: Generate Rules Reference
        run: pipenv run regis rules list -f markdown -D docs/website/docs/reference/rules

      - name: Ensure whats-new label exists
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh label create "whats-new" \
            --repo trivoallan/regis \
            --color "0075ca" \
            --description "Surfaces this PR's summary in the What's New docs page" \
            2>/dev/null || true

      - name: Generate What's New page
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: python scripts/generate_whats_new.py

      - name: Generate coverage badge
        continue-on-error: true
        run: |
          pipenv run pytest --cov --cov-report=xml -q --no-header
          pipenv run genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Generate Default Archive
        run: |
          mkdir -p docs/website/static/archives/default
          pipenv run regis analyze --evaluate alpine:latest -A docs/website/static/archives/default/
          pipenv run regis analyze --evaluate ghcr.io/trivoallan/regis:latest -A docs/website/static/archives/default/
          pipenv run regis analyze --evaluate ghcr.io/trivoallan/regis:main -A docs/website/static/archives/default/

      - name: Docusaurus build
        run: pnpm run build
        working-directory: docs/website

      - name: Create Pull Request for documentation updates
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "docs: update documentation reference and snapshots"
          author: regis-ci[bot] <regis-ci[bot]@users.noreply.github.com>
          branch: docs/automated-updates
          delete-branch: true
          title: "docs: update documentation reference and snapshots"
          body: |
            Automated documentation updates:
            - Generated latest JSON Schema reference
            - Generated latest Rules reference

            This PR ensures the documentation reflects the latest codebase.
            What's New page is generated at deploy time only (not committed).
          add-paths: |
            coverage-badge.svg
            docs/website/docs/reference/rules/**
            docs/website/docs/reference/schemas/**
            docs/website/static/schemas/**

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ steps.generate-token.outputs.token }}
          publish_dir: docs/website/build
          destination_dir: docs
          keep_files: true
          user_name: regis-ci[bot]
          user_email: regis-ci[bot]@users.noreply.github.com
          commit_message: "ci(docs): deploy documentation"

      - name: Deploy root redirect to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ steps.generate-token.outputs.token }}
          publish_dir: .github/pages-root
          destination_dir: .
          keep_files: true
          user_name: regis-ci[bot]
          user_email: regis-ci[bot]@users.noreply.github.com
          commit_message: "ci(docs): deploy root redirect"
